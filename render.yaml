services:
  - type: web
    name: freshbasket-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: MONGODB_URI
        sync: false          # set manually in Render dashboard — never commit real URI
      - key: TWILIO_ACCOUNT_SID
        sync: false          # set manually in Render dashboard
      - key: TWILIO_AUTH_TOKEN
        sync: false          # set manually in Render dashboard
      - key: TWILIO_PHONE_NUMBER
        sync: false          # set manually in Render dashboard
      - key: FCM_SERVER_KEY
        sync: false          # DEPRECATED — replaced by FIREBASE_SERVICE_ACCOUNT_JSON
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false          # Full service account JSON string — Firebase Console → Project Settings → Service Accounts → Generate New Private Key
